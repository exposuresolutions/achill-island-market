services:
  - type: web
    name: es-chat-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        value: https://api.moonshot.ai/v1
      - key: KIMI_MODEL
        value: moonshot-v1-8k
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        value: "1399744360"
      - key: ADMIN_KEY
        sync: false
      - key: NODE_ENV
        value: production
